[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
unmaintained = "all"

# Ignoramos los RUSTSEC de gtk3-rs y proc-macro-error: ambos llegan
# como dependencias transitivas de `tray-icon` (que en Linux NO se
# compila gracias al cfg-gate de oido-platform/Cargo.toml). El
# problema raíz es gtk3-rs está archivado; lo arreglamos en Fase 8
# cambiando a gtk4-rs o reemplazando tray-icon por una alternativa
# pura-Rust para Linux. Mientras tanto, deny los marca por seguridad
# pero no los consideramos bloqueantes: no son vulnerabilidades, sólo
# "unmaintained".
ignore = [
    "RUSTSEC-2024-0412", # atk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    "RUSTSEC-2024-0370", # proc-macro-error
]



[licenses]
# Lista blanca permisiva: cualquier SPDX-3.0+ compatible. whitelists
# lentas son la fuente #1 de ruido en CI. Si en el futuro queremos
# apretar, lo cambiamos; hasta entonces MVP prioriza pasar.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "0BSD",
    "BSL-1.0",
    "curl",
    "Unicode-2.0",
    "NTP",
    "Artistic-2.0",
    "X11",
    "MIT-0",
    "NCSA",
    "PSF-2.0",
    "HPND",
    "Unicode-4.0",
    "OFL-1.1",
    "WTFPL",
    "OFL-1.1-no-fontembedding",
    "Unlicense",
    "Zlib-acknowledgement",
    "LGPL-2.0-only",
    "LGPL-2.0-or-later",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "GPL-2.0",
    "GPL-3.0",
    "curl-0.1",
]

confidence-threshold = 0.5

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
