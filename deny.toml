[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
unmaintained = "all"

# Ignoramos los RUSTSEC de gtk3-rs y proc-macro-error: ambos llegan
# como dependencias transitivas de `tray-icon` (que en Linux NO se
# compila gracias al cfg-gate de oido-platform/Cargo.toml). El
# problema raíz es gtk3-rs está archivado; lo arreglamos en Fase 8
# cambiando a gtk4-rs o reemplazando tray-icon por una alternativa
# pura-Rust para Linux. Mientras tanto, deny los marca por seguridad
# pero no los consideramos bloqueantes: no son vulnerabilidades, sólo
# "unmaintained".
ignore = [
    "RUSTSEC-2024-0412", # atk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    "RUSTSEC-2024-0370", # proc-macro-error
    # ----------------------------------------------------------------
    # quick-xml 0.38.4 (transitivo de self_update 0.44):
    #
    #   RUSTSEC-2025-0052 (unmaintained) — crate sin mantenimiento.
    #   RUSTSEC-2026-0194 (duplicate attribute check OOM) — bypass del
    #     check de atributos duplicados permite DoS por OOM.
    #   RUSTSEC-2026-0195 (NamespaceResolver OOM) — un tag start con
    #     N declaraciones de namespace dispara ~3N bytes de heap en
    #     NamespaceResolver antes de que el consumer lo vea.
    #
    # El fix upstream está en quick-xml >= 0.41.0, pero self_update
    # 0.44 requiere quick-xml = "^0.38" en su Cargo.toml, así que no
    # podemos subir la transitiva sin un cambio de versión mayor en
    # self_update (1.0-rc.x, aún inestable).
    #
    # **No estamos expuestos**: self_update 0.44 parsea GitHub
    # Releases con `serde_json` (verificado en su github.rs backend),
    # NO con quick-xml. Las 3 advisories afectan únicamente a usuarios
    # de `quick_xml::NsReader` / `Reader` con namespace resolution,
    # APIs que no ejercitamos. Reevaluar si en el futuro algún crate
    # del workspace empieza a usar quick-xml para parsear XML
    # untrusted.
    # ----------------------------------------------------------------
    "RUSTSEC-2025-0052",
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]



[licenses]
# Lista blanca permisiva con los SPDX mas comunes y unions
# frecuentes. Cargo-deny v2 acepta globs parciales pero `*` rompe
# el parser; usamos allow + unions tolerantes.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "0BSD",
    "BSL-1.0",
    "MIT-0",
    "Unlicense",
    "PSF-2.0",
    "NCSA",
    "Artistic-2.0",
    "X11",
    "NTP",
    "HPND",
    "WTFPL",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "GPL-2.0",
    "GPL-3.0",
    "OFL-1.1",
    # CDLA-Permissive-2.0: viene transitivo de webpki-root-certs (1.0.8) →
    # rustls-platform-verifier → reqwest 0.13. Es una lista de roots
    # de Mozilla cubierta por el acuerdo de datos comunitarios. No es
    # código que se linke estáticamente; se consume en runtime al
    # validar cadenas TLS.
    "CDLA-Permissive-2.0",
]

confidence-threshold = 0.5

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
