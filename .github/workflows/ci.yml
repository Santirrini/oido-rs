name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Sin `RUSTFLAGS: -D warnings` aquí: las advertencias informativas
  # (`missing_debug_implementations`, pedantic local, etc.) no deben
  # romper el build. El paso `cargo clippy` abajo niega pedantic + all
  # de forma explícita.

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build:
    name: build / clippy / nextest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            cmake \
            libdbus-1-dev \
            libgtk-3-dev \
            libssl-dev \
            libxdo-dev \
            libxkbcommon-dev \
            libxss-dev \
            libayatana-appindicator3-dev \
            pkg-config

      - name: cargo build
        run: cargo build --verbose --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install nextest
        run: cargo install cargo-nextest --locked --version 0.9.95

      - name: cargo nextest
        run: cargo nextest run --workspace --no-fail-fast --no-tests=warn

      - name: cargo doc
        run: cargo doc --workspace --no-deps --quiet

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: deny check
        run: cargo deny check

  machete:
    # Detecta dependencias declaradas en Cargo.toml que no se usan en
    # el código. Atrapa el patrón "dep copiada del crate viejo y nunca
    # removida" que ya tuvimos en oido-audio/oido-hotkey/oido-input.
    name: cargo-machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: machete check
        # `cargo-machete` opera sobre el workspace por defecto (no
        # acepta el flag `--workspace` en 0.9.x).
        run: cargo machete
